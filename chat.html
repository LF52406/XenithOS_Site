<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XenithOS - Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="chat.css">
</head>
<body>

<div class="aurora-bg">
    <div class="blob purple"></div>
    <div class="blob orange"></div>
    <div class="blob blue"></div>
</div>

<nav>
    <a href="index.html" class="logo-container" id="logo-nav">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 6L6 18" stroke="#e4e6eb" stroke-width="3" stroke-linecap="round"/>
                <path d="M6 6L18 18" stroke="#e4e6eb" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
        <span>XenithOS</span>
    </a>
</nav>

<div id="chat-page">
    <div class="chat-header-container">
        <a href="index.html" class="back-btn" id="btn-back">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </a>
        <div class="chat-header-text">
            <h1 data-i18n="chat_title">Community Chat</h1>
            <p data-i18n="chat_desc">Discuss XenithOS with others</p>
        </div>
        <button id="chat-settings-btn" class="settings-btn" style="display: none;">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
    </div>

    <div class="chat-box">
        <div class="static-system-msg" data-i18n="chat_sys_welcome">Добро пожаловать в чат XenithOS! Пожалуйста, уважайте друг друга.</div>

        <div id="pinned-message" class="pinned-message-container" style="display: none;">
            <div class="pinned-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
            </div>
            <div class="pinned-content">
                <div class="pinned-title" data-i18n="pinned_title">Pinned Message</div>
                <div id="pinned-text" class="pinned-text"></div>
            </div>
            <button id="unpin-btn" class="unpin-btn" style="display: none;">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div id="reply-preview" class="reply-preview-container" style="display: none;">
            <div class="reply-preview-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
            </div>
            <div class="reply-preview-content">
                <div class="reply-preview-author" id="reply-preview-author"></div>
                <div class="reply-preview-text" id="reply-preview-text"></div>
            </div>
            <button id="reply-preview-close" class="reply-preview-close">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>

        <div class="chat-input-container">
            <div class="emoji-picker" id="emoji-picker">
                <div class="emoji-tabs">
                    <div class="emoji-tab active" data-category="smileys">😀</div>
                    <div class="emoji-tab" data-category="people">👋</div>
                    <div class="emoji-tab" data-category="symbols">❤️</div>
                </div>
                <div class="emoji-grid-container">
                    <div class="emoji-grid" id="emoji-grid"></div>
                </div>
            </div>

            <input type="file" id="chat-file-input" style="display: none;" accept="*/*">
            
            <button class="chat-sticker-btn" id="chat-attach-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
            </button>

            <button class="chat-sticker-btn" id="poll-btn" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="8" y1="12" x2="8" y2="12.01"></line>
                    <line x1="12" y1="12" x2="12" y2="12.01"></line>
                    <line x1="16" y1="12" x2="16" y2="12.01"></line>
                </svg>
            </button>

            <button class="chat-sticker-btn" id="chat-sticker-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
            </button>

            <input type="text" id="chat-input" class="chat-input" data-i18n-placeholder="chat_placeholder" placeholder="Type a message...">
            
            <button class="chat-send" id="chat-send">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<div id="image-viewer" class="image-viewer-overlay">
    <img id="viewer-img" src="" alt="View">
</div>

<div id="upload-modal" class="custom-modal-overlay">
    <div class="custom-modal">
        <h3 id="upload-title">Uploading...</h3>
        <div class="upload-progress-bg">
            <div id="upload-progress-bar" class="upload-progress-fill"></div>
        </div>
        <div id="upload-percent" class="upload-percent-text">0%</div>
    </div>
</div>

<div id="custom-modal" class="custom-modal-overlay">
    <div class="custom-modal">
        <h3 id="modal-title">Title</h3>
        <input type="text" id="modal-input" autocomplete="off">
        <div class="modal-buttons">
            <button id="modal-btn-cancel" class="modal-btn modal-btn-cancel" data-i18n="btn_cancel">Cancel</button>
            <button id="modal-btn-confirm" class="modal-btn modal-btn-confirm" data-i18n="btn_save">Save</button>
        </div>
    </div>
</div>

<div id="poll-modal" class="custom-modal-overlay">
    <div class="custom-modal">
        <h3 data-i18n="poll_create_title">Create Poll</h3>
        <input type="text" id="poll-question-input" data-i18n-placeholder="poll_question_ph" placeholder="Ask a question..." style="margin-bottom: 16px;">
        <div id="poll-options-container">
            <input type="text" class="poll-option-input" placeholder="Option 1">
            <input type="text" class="poll-option-input" placeholder="Option 2">
        </div>
        <button id="poll-add-option-btn" style="background: none; border: none; color: #9632ff; cursor: pointer; margin-bottom: 20px; margin-top: 5px; font-weight: 700; font-size: 15px;">+ Add Option</button>
        <div class="modal-buttons">
            <button id="poll-btn-cancel" class="modal-btn modal-btn-cancel" data-i18n="btn_cancel">Cancel</button>
            <button id="poll-btn-confirm" class="modal-btn modal-btn-confirm" data-i18n="poll_btn_send">Send Poll</button>
        </div>
    </div>
</div>

<script type="module" src="chat.js"></script>
</body>
</html>
